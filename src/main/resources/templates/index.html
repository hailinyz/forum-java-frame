<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海林博客 — 首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body{background-color:#f5f7fa;min-height:100vh;display:flex;flex-direction:column;}
        footer{margin-top:auto;}
        .card-hover{transition:all 0.25s;}
        .card-hover:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.06);}
        .bg-nav{background:#34495e !important;}
        .btn-main{background:#34495e;color:#fff;}
        .btn-main:hover{background:#2c3e50;color:#fff;}
        .text-main{color:#34495e;}
        .badge-cate{background:#e8edf1;color:#34495e;}
    </style>
</head>
<body>
<!--导航-->
<nav class="navbar navbar-expand-lg bg-nav navbar-dark shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-journal-text me-2"></i>海林博客
            <span class="badge bg-secondary ms-1">Hi</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <div class="navbar-nav me-auto">
                <a class="nav-link active" th:href="@{/}">首页</a>
                <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/article/new}">写文章</a>
            </div>
            <form class="d-flex me-3" th:action="@{/index}" method="get">
                <input class="form-control form-control-sm bg-light bg-opacity-25 border-secondary text-white me-2"
                       name="keyword" placeholder="搜索文章..." th:value="${keyword}">
                <button class="btn btn-sm btn-outline-light" type="submit"><i class="bi bi-search"></i></button>
            </form>
            <div sec:authorize="!isAuthenticated()" class="d-flex gap-2">
                <a href="@{/login}" class="btn btn-sm btn-outline-light">登录</a>
                <a href="@{/register}" class="btn btn-sm btn-main">注册</a>
            </div>
            <div sec:authorize="isAuthenticated()" class="d-flex gap-2 align-items-center">
                <a class="btn btn-sm btn-outline-light" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/categories}">管理后台</a>
                <a class="btn btn-sm btn-outline-light" th:href="@{/user/profile}">
                    <i class="bi bi-person"></i> <span sec:authentication="name"></span>
                </a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button class="btn btn-sm btn-danger" type="submit">退出</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!--主体-->
<div class="container py-5 flex-grow-1">
    <div class="row g-4">
        <div class="col-lg-8">
            <div th:if="${articles.isEmpty()}" class="card p-5 text-center shadow-sm border-0">
                <div class="fs-1 text-secondary mb-3">📝</div>
                <h5 class="text-secondary mb-3">暂无任何文章</h5>
                <div>
                    <a sec:authorize="isAuthenticated()" th:href="@{/article/new}" class="btn btn-main me-2">发布第一篇文章</a>
                    <a sec:authorize="!isAuthenticated()" th:href="@{/register}" class="btn btn-outline-secondary">注册账号</a>
                </div>
            </div>

            <div class="d-flex flex-column gap-4" th:if="${!articles.isEmpty()}">
                <div class="card card-hover shadow-sm border-0" th:each="article : ${articles}">
                    <div class="card-body">
                        <a th:href="@{/index(categoryId=${article.categoryId})}" class="badge badge-cate text-decoration-none">
                            [[${article.categoryName}]]
                        </a>
                        <h4 class="card-title mt-2 mb-2">
                            <a th:href="@{'/article/' + ${article.id}}" class="text-dark text-decoration-none hover:text-main" th:text="${article.title}"></a>
                        </h4>
                        <p class="card-text text-secondary lh-base" th:text="${article.summary}"></p>
                        <div class="d-flex gap-3 text-muted small pt-2 border-top mt-3">
                            <span><i class="bi bi-person-circle"></i> [[${article.authorName}]]</span>
                            <span><i class="bi bi-calendar3"></i> [[${#temporals.format(article.createTime, 'yyyy-MM-dd')}]]</span>
                            <span><i class="bi bi-eye"></i> [[${article.viewCount}]] 阅读</span>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="mt-5" th:if="${totalPages >1}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage ==1 ? 'disabled':''}">
                        <a class="page-link text-main" th:href="@{/index(page=${currentPage-1},categoryId=${currentCategory},keyword=${keyword})}">‹</a>
                    </li>
                    <li class="page-item" th:each="i:${#numbers.sequence(1,totalPages)}" th:classappend="${i==currentPage?'active':''}">
                        <a class="page-link" th:text="${i}" th:href="@{/index(page=${i},categoryId=${currentCategory},keyword=${keyword})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled':''}">
                        <a class="page-link text-main" th:href="@{/index(page=${currentPage+1},categoryId=${currentCategory},keyword=${keyword})}">›</a>
                    </li>
                </ul>
            </nav>
        </div>

        <!--侧边栏-->
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 sticky-top" style="top:80px">
                <div class="card-header bg-white fw-bold">
                    <i class="bi bi-folder2-open me-2 text-main"></i>文章分类
                </div>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action" th:classappend="${currentCategory==null?'active':''}" th:href="@{/index}">
                        📋 全部文章
                    </a>
                    <a class="list-group-item list-group-item-action" th:each="category:${categories}"
                       th:classappend="${currentCategory==category.id?'active':''}"
                       th:href="@{/index(categoryId=${category.id})}" th:text="${category.name}"></a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-secondary text-white py-3 text-center">
    <span>©2026 海林博客</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
