<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 海林博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card{
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 2px 18px rgba(0,0,0,0.07);
        }
        .right-side{
            background:#34495e;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .btn-dark{
            background:#34495e;
        }
        .btn-dark:hover{
            background:#2c3e50;
        }
        .icon-box{
            width:54px;height:54px;
            background:#34495e;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-size:22px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-xl-8 col-lg-10">
            <div class="card login-card border-0">
                <div class="row g-0">
                    <!--左侧表单-->
                    <div class="col-lg-6 p-5">
                        <div class="text-center mb-4">
                            <div class="icon-box mx-auto mb-3">
                                <i class="bi bi-journal-text"></i>
                            </div>
                            <h4 class="fw-bold text-dark">欢迎登录</h4>
                            <p class="text-secondary mb-0">登录海林博客个人账号</p>
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger">用户名或密码错误</div>
                        <div th:if="${param.logout}" class="alert alert-success">已成功退出登录</div>
                        <div th:if="${param.register}" class="alert alert-success">注册成功，请登录</div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" name="username" class="form-control form-control-lg" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">密码</label>
                                <input type="password" name="password" class="form-control form-control-lg" required>
                            </div>
                            <button class="btn btn-dark w-100 btn-lg">登录</button>
                        </form>

                        <div class="text-center mt-4 text-secondary">
                            暂无账号？<a th:href="@{/register}" class="text-dark text-decoration-none fw-medium">前往注册</a>
                        </div>
                    </div>
                    <!--右侧介绍 大屏显示-->
                    <div class="col-lg-6 right-side d-none d-lg-block p-5">
                        <div class="text-center">
                            <i class="bi bi-book" style="font-size:68px;opacity:0.85"></i>
                            <h3 class="mt-3 fw-semibold">海林博客</h3>
                            <p class="opacity-85 mt-2">记录日常随笔，分享技术心得</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
