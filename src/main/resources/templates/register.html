<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 海林博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 18px rgba(0,0,0,0.07);
            border: 0;
        }
        .right-side {
            background: #34495e;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-custom {
            background-color: #34495e;
            color: #fff;
        }
        .btn-custom:hover {
            background-color: #2c3e50;
            color: #fff;
        }
        .icon-box {
            width: 54px;
            height: 54px;
            background: #34495e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
        }
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-xl-8 col-lg-10 col-md-12">
            <div class="card register-card">
                <div class="row g-0">

                    <!-- 左侧注册表单 -->
                    <div class="col-lg-6 p-5">
                        <div class="text-center mb-4">
                            <div class="icon-box mx-auto mb-3">
                                <i class="bi bi-person-plus"></i>
                            </div>
                            <h4 class="fw-bold">创建账号</h4>
                            <p class="text-secondary">加入海林博客，开启分享</p>
                        </div>

                        <!-- 错误提示 -->
                        <div th:if="${error}" class="alert alert-danger mb-3">
                            [[${error}]]
                        </div>

                        <form th:action="@{/user/register}" method="post" id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" name="username" class="form-control form-control-lg" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">昵称</label>
                                <input type="text" name="nickname" class="form-control form-control-lg" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" name="email" class="form-control form-control-lg" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">密码</label>
                                <div class="password-wrapper">
                                    <input type="password" name="password" id="password" class="form-control form-control-lg" required>
                                    <span class="password-toggle" id="togglePwd">👁</span>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-custom w-100 btn-lg">注 册</button>
                        </form>

                        <div class="text-center mt-3 text-secondary small">
                            已有账号？<a th:href="@{/login}" class="text-dark fw-medium text-decoration-none">立即登录</a>
                        </div>
                    </div>

                    <!-- 右侧宣传区（电脑显示） -->
                    <div class="col-lg-6 right-side d-none d-lg-flex p-5">
                        <div class="text-center px-4">
                            <i class="bi bi-journal-text" style="font-size:70px; opacity:0.9;"></i>
                            <h3 class="mt-3 mb-3 fw-bold">海林博客</h3>
                            <p class="opacity-90">记录生活 • 分享知识 • 共同成长</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 密码显示/隐藏
    document.getElementById('togglePwd').addEventListener('click', function () {
        const pwd = document.getElementById('password');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            this.textContent = '🙈';
        } else {
            pwd.type = 'password';
            this.textContent = '👁';
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
